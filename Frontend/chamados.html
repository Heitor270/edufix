<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISEPAM — Chamados</title>
    <script>const t=localStorage.getItem('tema')||'light';document.documentElement.setAttribute('data-theme',t);</script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2>Patrimônio</h2>
            <p id="usuario-nome">Carregando...</p>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item" href="dashboard.html">Dashboard</a>
            <a class="nav-item" href="inventario.html">Inventário</a>
            <a class="nav-item" href="cadastrar-bem.html">Cadastrar</a>
            <a class="nav-item active" href="chamados.html">Chamados</a>
            <a class="nav-item" href="relatorios.html">Relatórios</a>
        </nav>
        <div class="sidebar-footer">
            <button class="theme-toggle" onclick="alternarTema()">🌙 Modo Escuro</button>
            <a class="nav-item sair" onclick="sair()">Sair</a>
        </div>
    </aside>

    <main class="main">
        <h1 class="page-title">Chamados de Manutenção</h1>

        <div class="form-card" style="max-width: 100%; margin-bottom: 24px;">
            <div class="form-group">
                <input type="text" id="patrimonio-chamado" placeholder="Nº do Patrimônio (opcional)" />
            </div>
            <div class="form-group">
                <input type="text" id="descricao-chamado" placeholder="Descrição do problema *" />
            </div>
            <div class="form-group">
                <label>Prioridade:</label>
                <!-- Valores alinhados com ENUM do banco: baixa, media, alta, critica -->
                <select id="prioridade-chamado">
                    <option value="baixa">Baixa</option>
                    <option value="media" selected>Média</option>
                    <option value="alta">Alta</option>
                    <option value="critica">Crítica</option>
                </select>
            </div>
            <button class="btn-save" onclick="abrirChamado()" style="width: 100%; padding: 12px;">Abrir Chamado</button>
        </div>

        <!-- Filtros: valores alinhados com ENUM do banco -->
        <div class="filtros-chamado">
            <button class="filtro-btn active" onclick="filtrarChamados('todos', this)">Todos</button>
            <button class="filtro-btn" onclick="filtrarChamados('aberto', this)">Aberto</button>
            <button class="filtro-btn" onclick="filtrarChamados('em_analise', this)">Em Análise</button>
            <button class="filtro-btn" onclick="filtrarChamados('em_execucao', this)">Em Execução</button>
            <button class="filtro-btn" onclick="filtrarChamados('concluido', this)">Concluído</button>
            <button class="filtro-btn" onclick="filtrarChamados('cancelado', this)">Cancelado</button>
        </div>

        <div class="recent-card" style="margin-top: 20px;">
            <div id="lista-chamados" class="recent-empty">Carregando chamados...</div>
        </div>
    </main>
</div>

<style>
.filtros-chamado {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.filtro-btn {
    padding: 8px 18px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--text-mid);
    font-size: 13px;
    font-family: var(--font);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
}

.filtro-btn:hover  { border-color: var(--accent); color: var(--accent); }
.filtro-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
</style>

<script src="script.js"></script>
</body>
</html>
