<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISEPAM — Cadastrar Bem</title>
    <script>const t=localStorage.getItem('tema')||'light';document.documentElement.setAttribute('data-theme',t);</script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2>Patrimônio</h2>
            <p id="usuario-nome">Carregando...</p>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item" href="dashboard.html">Dashboard</a>
            <a class="nav-item" href="inventario.html">Inventário</a>
            <a class="nav-item active" href="cadastrar-bem.html">Cadastrar</a>
            <a class="nav-item" href="chamados.html">Chamados</a>
            <a class="nav-item" href="relatorios.html">Relatórios</a>
        </nav>
        <div class="sidebar-footer">
            <button class="theme-toggle" onclick="alternarTema()">🌙 Modo Escuro</button>
            <a class="nav-item sair" onclick="sair()">Sair</a>
        </div>
    </aside>

    <main class="main">
        <h1 class="page-title">Novo Cadastro de Bem</h1>

        <div class="form-card">
            <div class="form-group">
                <input type="text" id="numero_patrimonio" placeholder="Número do Patrimônio *" />
            </div>

            <div class="form-group">
                <input type="text" id="nome" placeholder="Nome do Item *" />
            </div>

            <div class="form-group">
                <input type="text" id="descricao" placeholder="Descrição" />
            </div>

            <div class="form-group">
                <input type="text" id="localizacao" placeholder="Localização" />
            </div>

            <div class="form-group">
                <label>Estado de Conservação:</label>
                <select id="estado_conservacao">
                    <option value="otimo">Ótimo</option>
                    <option value="bom" selected>Bom</option>
                    <option value="regular">Regular</option>
                    <option value="ruim">Ruim</option>
                    <option value="inutilizavel">Inutilizável</option>
                </select>
            </div>

            <div class="form-group">
                <label>Categoria:</label>
                <select id="categoria">
                    <option value="Informatica">Informática</option>
                    <option value="Mobiliario">Mobiliário</option>
                    <option value="Climatizacao">Climatização</option>
                    <option value="Eletrodomestico">Eletrodoméstico</option>
                    <option value="Outro">Outro</option>
                </select>
            </div>

            <div class="form-group">
                <label>Status:</label>
                <select id="status">
                    <option value="disponivel" selected>Disponível</option>
                    <option value="em_uso">Em Uso</option>
                    <option value="em_manutencao">Em Manutenção</option>
                    <option value="inativo">Inativo</option>
                </select>
            </div>

            <div class="form-group">
                <label>Data de Aquisição: *</label>
                <input type="date" id="data_aquisicao" />
            </div>

            <button class="btn-save" onclick="salvarBem()" style="width: 100%; padding: 13px;">Salvar Bem</button>
            <p class="erro" id="erro" style="margin-top: 10px;"></p>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
