<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISEPAM — Dashboard</title>
    <script>const t=localStorage.getItem('tema')||'light';document.documentElement.setAttribute('data-theme',t);</script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2>Patrimônio</h2>
            <p id="usuario-nome">Carregando...</p>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item active" href="dashboard.html">Dashboard</a>
            <a class="nav-item" href="inventario.html">Inventário</a>
            <a class="nav-item" href="cadastrar-bem.html">Cadastrar</a>
            <a class="nav-item" href="chamados.html">Chamados</a>
            <a class="nav-item" href="relatorios.html">Relatórios</a>
        </nav>
        <div class="sidebar-footer">
            <button class="theme-toggle" onclick="alternarTema()">🌙 Modo Escuro</button>
            <a class="nav-item sair" onclick="sair()">Sair</a>
        </div>
    </aside>

    <main class="main">
        <h1 class="page-title">Dashboard</h1>

        <div class="cards-grid">
            <div class="card">
                <div class="card-number" id="total-itens">0</div>
                <div class="card-label">Itens Totais</div>
            </div>
            <div class="card">
                <div class="card-number" id="total-chamados">0</div>
                <div class="card-label">Chamados Totais</div>
            </div>
            <div class="card">
                <div class="card-number" id="em-manutencao">0</div>
                <div class="card-label">Em Manutenção</div>
            </div>
        </div>

        <div class="recent-card">
            <h3>Atividades Recentes</h3>
            <div class="recent-empty">Nenhuma atividade recente.</div>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
